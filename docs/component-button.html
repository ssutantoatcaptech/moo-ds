<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button - MoO Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .page-content { max-width: 960px; margin: 0 auto; padding: 40px 60px; }
    .back-link { font-size: 14px; color: #105fa8; text-decoration: none; display: flex; align-items: center; gap: 6px; margin-bottom: 24px; }
    .back-link:hover { text-decoration: underline; }
    h1 { font-size: 32px; color: #003a70; margin-bottom: 4px; }
    .file-name { font-size: 13px; color: #105fa8; font-family: 'SF Mono', 'Courier New', monospace; margin-bottom: 8px; }
    .description { font-size: 16px; color: #5d5d5d; margin-bottom: 32px; }
    .gh-link { display: block; margin-bottom: 32px; font-size: 13px; color: #105fa8; text-decoration: none; font-weight: 600; }
    .gh-link:hover { text-decoration: underline; }
    .section-title { font-size: 20px; color: #003a70; margin-bottom: 16px; }
    .preview-box { background: #f9fafb; border: 1px solid #f0f0f0; border-radius: 8px; padding: 32px; margin-bottom: 32px; }
  </style>
</head>
<body>
  <nav class="ds-nav">
    <div class="ds-nav-left">
      <span class="ds-brand">MoO Design System</span>
      <div class="ds-tabs">
        <a href="index.html" class="ds-tab">Overview</a>
        <a href="tokens.html" class="ds-tab">Design Tokens</a>
        <a href="iconography.html" class="ds-tab">Iconography</a>
        <a href="components.html" class="ds-tab active">Components</a>
        <a href="dashboard.html" class="ds-tab">Dashboard Preview</a>
        <a href="mobile-dashboard.html" class="ds-tab">Mobile Dashboard</a>
        <a href="login-registration.html" class="ds-tab">Login &amp; Registration</a>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <a href="components.html" class="back-link">&larr; Back to Components</a>
    <h1>Button</h1>
    <div class="file-name">Button.tsx</div>
    <p class="description">Primary, secondary, outline, and subtle button variants with size options.</p>
    <a href="https://github.com/ssutantoatcaptech/moo-ds/blob/main/src/components/Button.tsx" class="gh-link">View on GitHub &rarr;</a>

    <h2 class="section-title">Variants</h2>
    <div class="preview-box">
      <div style="display: flex; gap: 16px; align-items: center;">
        <button style="background: #105fa8; color: white; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: none; min-height: 44px; cursor: pointer;">Primary</button>
        <button style="background: white; color: #222; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: 1px solid #838383; min-height: 44px; cursor: pointer;">Default</button>
        <button style="background: transparent; color: #105fa8; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: 1px solid #105fa8; min-height: 44px; cursor: pointer;">Outline</button>
        <button style="background: transparent; color: #105fa8; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: none; min-height: 44px; cursor: pointer;" onmouseover="this.style.background='#f0f5fa'" onmouseout="this.style.background='transparent'">Subtle</button>
        <button style="background: transparent; color: #105fa8; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: none; min-height: 44px; cursor: pointer; text-decoration: underline;">Transparent</button>
      </div>
    </div>

    <h2 class="section-title">Sizes</h2>
    <div class="preview-box">
      <div style="display: flex; gap: 16px; align-items: center;">
        <button style="background: #105fa8; color: white; font-family: 'Source Sans Pro', sans-serif; font-size: 14px; font-weight: 600; padding: 6px 16px; border-radius: 4px; border: none; min-height: 32px; cursor: pointer;">Small</button>
        <button style="background: #105fa8; color: white; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: none; min-height: 44px; cursor: pointer;">Medium</button>
        <button style="background: #105fa8; color: white; font-family: 'Source Sans Pro', sans-serif; font-size: 18px; font-weight: 600; padding: 12px 32px; border-radius: 4px; border: none; min-height: 52px; cursor: pointer;">Large</button>
      </div>
    </div>

    <h2 class="section-title">Disabled</h2>
    <div class="preview-box">
      <div style="display: flex; gap: 16px; align-items: center;">
        <button style="background: #105fa8; color: white; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: none; min-height: 44px; opacity: 0.4; cursor: not-allowed;" disabled>Primary</button>
        <button style="background: white; color: #222; font-family: 'Source Sans Pro', sans-serif; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 4px; border: 1px solid #838383; min-height: 44px; opacity: 0.4; cursor: not-allowed;" disabled>Default</button>
      </div>
    </div>
  </div>
</body>
</html>
